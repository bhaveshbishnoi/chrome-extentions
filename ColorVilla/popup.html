<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ColorVilla</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <h1>ColorVilla</h1>
      </div>
      <button id="pickBtn" class="primary-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4c.4-.4 1-.4 1.4 0l1.2 1.2c.4.4.4 1 0 1.4L17.6 8.6L15 6Z"/><path d="m11 10 3 3"/></svg>
        Pick Color
      </button>
    </header>

    <main>
      <section class="selection-preview">
        <div id="colorPreview" class="color-circle"></div>
        <div class="color-codes">
          <div class="code-card" data-format="hex">
            <span class="label">HEX</span>
            <span id="hexCode" class="value">#FF0000</span>
            <button class="copy-btn" title="Copy">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            </button>
          </div>
          <div class="code-card" data-format="rgb">
            <span class="label">RGB</span>
            <span id="rgbCode" class="value">rgb(255, 0, 0)</span>
            <button class="copy-btn" title="Copy">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            </button>
          </div>
        </div>
      </section>

      <section class="tabs-nav">
        <button class="tab-btn active" data-tab="variations" title="Variations">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        </button>
        <button class="tab-btn" data-tab="harmonies" title="Harmonies">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2Z"/><path d="M12 12a5 5 0 1 1-5-5"/><path d="M12 7a5 5 0 0 1 5 5"/></svg>
        </button>
        <button class="tab-btn" data-tab="contrast" title="Contrast Checker">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 18a6 6 0 0 0 0-12v12z"/></svg>
        </button>
        <button class="tab-btn" data-tab="inspiration" title="Inspiration">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        </button>
        <button class="tab-btn" data-tab="history" title="History">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="m12 7 0 5 3 2"/></svg>
        </button>
      </section>

      <!-- TAB: Variations -->
      <div class="tab-content active" id="variationsTab">
        <div class="palette-section">
          <h3>Shades</h3>
          <div id="shadesContainer" class="palette-grid"></div>
        </div>
        <div class="palette-section">
          <h3>Tints</h3>
          <div id="tintsContainer" class="palette-grid"></div>
        </div>
      </div>

      <!-- TAB: Harmonies -->
      <div class="tab-content" id="harmoniesTab">
        <div class="palette-section">
          <h3>Relationships</h3>
          <div id="harmoniesContainer" class="palette-grid wide"></div>
        </div>
      </div>

      <!-- TAB: Contrast -->
      <div class="tab-content" id="contrastTab">
        <div class="contrast-checker">
          <div class="contrast-demo" id="contrastDemo">
            <span id="contrastText">Preview Text</span>
          </div>
          <div class="contrast-info">
            <div class="ratio-circle">
              <span id="contrastRatio">1.0</span>
              <span class="ratio-label">Ratio</span>
            </div>
            <div class="badges">
              <div class="badge" id="badgeAA">AA</div>
              <div class="badge" id="badgeAAA">AAA</div>
            </div>
          </div>
          <div class="contrast-inputs">
            <div class="input-group">
              <label>Background</label>
              <div class="color-input-wrapper">
                <div class="color-swatch-sm" id="bgSwatch"></div>
                <input type="text" id="bgInput" value="#FFFFFF">
              </div>
            </div>
            <div class="input-group">
              <label>Text</label>
              <div class="color-input-wrapper">
                <div class="color-swatch-sm" id="textSwatch"></div>
                <input type="text" id="textInput" value="#000000">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- TAB: Inspiration -->
      <div class="tab-content" id="inspirationTab">
        <div class="palette-section">
          <div class="section-header">
            <h3>Suggested Palettes</h3>
            <button id="refreshInspiration" class="icon-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
            </button>
          </div>
          <div id="inspirationContainer" class="inspiration-list"></div>
        </div>
      </div>

      <!-- TAB: History -->
      <div class="tab-content" id="historyTab">
        <div id="historyContainer" class="history-list"></div>
      </div>
    </main>

    <footer>
      <div class="export-actions">
        <button id="exportCSS" class="text-btn">Copy CSS</button>
        <button id="exportJSON" class="text-btn">Copy JSON</button>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
